name: Repository Analysis & Auto-Documentation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0' # Weekly

jobs:
  analyze-and-document:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          if [ -f .github/scripts/requirements.txt ]; then pip install -r .github/scripts/requirements.txt; fi
          pip install networkx matplotlib graphviz jinja2

      - name: Run Repository Analysis
        run: python .github/scripts/repo_analyzer.py

      - name: Generate Architecture Diagrams
        run: python .github/scripts/diagram_generator.py

      - name: Update README
        run: python .github/scripts/readme_updater.py

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "docs: auto-update repository documentation and diagrams [skip ci]"
          file_pattern: 'README.md docs/*'
